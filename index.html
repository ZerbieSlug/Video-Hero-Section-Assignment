<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Hero Section</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hero Section with Video Background -->
  <section class="hero">

    <!-- Video Background -->
    <video class="hero-video" autoplay muted loop playsinline poster="thumbnail.jpg">
      <source src="spooky-cat.mp4" type="video/mp4">
      Your browser doesn't support video backgrounds.
    </video>

    <!-- Overlay for darkening video (optional but recommended) -->
    <div class="hero-overlay"></div>

    <!-- Content on top of video -->
    <div class="hero-content">
      <h1>Have you seen my cat?</h1>
      <h2>Oh, there it is!</h2>
	  <p>[Mission Failed - Always watch the cat no matter what!]</p>
	  <button>Retry</button>
    </div>

  </section>

</body>
</html>
